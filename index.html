<script>

	function build(data) {
		return data
			.map((repo) => el('div', [
				el('h3', repo.name),
				el('div', repo.description),
				el('div', repo.urls.map((url) =>
					el('a', '', { href: url.src, target: '_blank' }, [
						el('img', '', { class: 'icon', src: url.icon })
					])
				))
			]))
	}

	set('apps-list', build(apps))

	set('repo-list', build(repos))

</script>
